<section class="awards-section" aria-label="Awards and Recognition">

  <swiper-container #awardsSwiper init="false" class="awards-swiper">
    <swiper-slide *ngFor="let award of awards" class="award-slide">
      <figure class="award-item" [attr.title]="award.alt">
        <img [src]="award.src" [alt]="award.alt" class="award-img" loading="lazy" />
      </figure>
    </swiper-slide>
  </swiper-container>

</section>
